<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agrinho 2026: Simulador Sustentável</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Agro Forte, Futuro Sustentável</h1>
        <p>Encontre o equilíbrio entre produção e meio ambiente!</p>
    </header>

    <main>
        <div id="status-bar">
            <div class="status">Produtividade: <span id="prod-score">50</span>%</div>
            <div class="status">Meio Ambiente: <span id="env-score">50</span>%</div>
        </div>

        <div id="game-container">
            <h2 id="question-text">Carregando situação...</h2>
            <div id="options-container">
                </div>
            <p id="feedback-text"></p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
